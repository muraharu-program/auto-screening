name: Daily Stock Screening

on:
  schedule:
    # JST 10:00 = UTC 01:00 (平日のみ)
    - cron: '0 1 * * 1-5'
    # JST 13:00 = UTC 04:00
    - cron: '0 4 * * 1-5'
    # JST 16:00 = UTC 07:00
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    env:
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 10時/13時は地合い判定のみ、16時は通常スクリーニング
      - name: Run regime check or screening
        run: |
          if [ "${{ github.event.schedule }}" = "0 1 * * 1-5" ] || \
             [ "${{ github.event.schedule }}" = "0 4 * * 1-5" ]; then
            python main.py --regime-only
          else
            python main.py --hybrid --sentiment
          fi

      # スクリーニング結果をリポジトリにコミット＆プッシュ
      - name: Commit and push screening results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --cached --quiet || git commit -m "📊 スクリーニング結果 ($(date '+%Y-%m-%d'))"
          git push

      # モデル再学習は週 1 回（月曜）だけ — ハイブリッド学習に変更
  retrain:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * 1'
    env:
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Retrain hybrid model
        run: python main.py --hybrid-train

      # 古いローカルモデルを削除（最新のみ残す）
      - name: Clean old local models
        run: |
          cd models/local
          # 再学習で生成された最新モデルだけが残っている状態
          # Git履歴の肥大化を防ぐため、前回のモデルをGitから削除して最新に置き換え
          echo "ローカルモデル数: $(ls -1 *.pkl 2>/dev/null | wc -l)"

      # 学習済みモデルをリポジトリにコミット＆プッシュ
      - name: Commit and push updated models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A models/global_model.pkl models/local/
          git diff --cached --quiet || git commit -m "🤖 週次モデル再学習 ($(date '+%Y-%m-%d'))"
          git push
